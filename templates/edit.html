<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Student | StudentBook</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">📋 StudentBook</div>
      <div class="tagline">Edit Student Details</div>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>✏️ Edit Student</h2>

      <form action="/update/{{ student[0] }}" method="POST" class="add-form">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ student[1] }}" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ student[2] }}" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" value="{{ student[3] }}" required />
          </div>
          <div class="form-group">
            <label>Course</label>
            <input type="text" name="course" value="{{ student[4] }}" required />
          </div>
        </div>
        <div class="btn-row">
          <button type="submit" class="btn btn-add">💾 Save Changes</button>
          <a href="/" class="btn btn-clear">Cancel</a>
        </div>
      </form>

    </section>
  </main>

  <footer>
    <p>Made by <strong>Abhishek Mishra</strong> · Student Contact Management System</p>
  </footer>

</body>
</html>
